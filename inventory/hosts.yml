---
# Dynamic host definition.
#
# 1. Add each host once under `all.hosts` with its ansible_host (IP or
#    Tailscale name) and ansible_user.
# 2. Tag it into the group(s) below to apply that group's role.
#    Every host automatically gets the base role.
#
# Groups -> roles:
#   zfs      -> zfs role
#   k3s      -> k3s role (single node)
#   haproxy  -> haproxy role (separate machine)

all:
  vars:
    ansible_user: "{{ admin_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

  hosts:
    kingkiller:
      ansible_host: 192.168.1.100

  children:
    zfs:
      hosts:
        kingkiller:
    k3s:
      hosts:
        kingkiller:
    haproxy:
      hosts: {}   # haproxy runs on a separate machine; add it here later
