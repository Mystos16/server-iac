---
# Install mise-en-place system-wide from the official apt repo.
- name: Add mise apt keyring
  ansible.builtin.get_url:
    url: https://mise.jdx.dev/gpg-key.pub
    dest: /etc/apt/keyrings/mise-archive-keyring.gpg
    mode: "0644"
    force: false

- name: Add mise apt repository
  ansible.builtin.deb822_repository:
    name: mise
    types: deb
    uris: https://mise.jdx.dev/deb
    suites: stable
    components: main
    architectures: amd64
    signed_by: /etc/apt/keyrings/mise-archive-keyring.gpg
    state: present

- name: Install mise
  ansible.builtin.apt:
    name: mise
    state: present
    update_cache: true
