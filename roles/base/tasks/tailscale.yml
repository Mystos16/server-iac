---
- name: Install tailscale via official repo
  block:
    - name: Add tailscale apt keyring
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
        dest: /etc/apt/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
        force: false

    - name: Add tailscale apt repository
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/debian/trixie.tailscale-keyring.list
        dest: /etc/apt/sources.list.d/tailscale.list
        mode: "0644"

    - name: Install tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

- name: Ensure tailscaled is running
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check tailscale connection status
  ansible.builtin.command: tailscale status --json
  register: ts_status
  changed_when: false
  failed_when: false

- name: Bring tailscale up
  ansible.builtin.command: >-
    tailscale up --auth-key={{ tailscale_authkey }} {{ tailscale_up_args }}
  when:
    - tailscale_authkey | length > 0
    - (ts_status.stdout | default('') | length == 0) or
      ((ts_status.stdout | from_json).BackendState | default('') != 'Running')
  changed_when: true
  no_log: true
