---
- name: Install tailscale via official install script
  ansible.builtin.shell:
    cmd: curl -fsSL https://tailscale.com/install.sh | sh
    creates: /usr/bin/tailscale

- name: Ensure tailscaled is running
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Bring tailscale up (reconciles flags every run)
  ansible.builtin.command: >-
    tailscale up --auth-key={{ tailscale_authkey }} {{ tailscale_up_args }}
  when: tailscale_authkey | length > 0
  changed_when: true
  no_log: true
