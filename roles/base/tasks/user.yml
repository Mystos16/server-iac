---
- name: Create admin group
  ansible.builtin.group:
    name: "{{ admin_user }}"
    state: present

- name: Create admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    group: "{{ admin_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true
    state: present

- name: Install admin SSH authorized key
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ admin_ssh_key }}"
    state: present

- name: Grant passwordless sudo to admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
