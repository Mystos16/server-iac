---
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Download k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_bin.stat.exists

- name: Install k3s (single node, default config)
  ansible.builtin.command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_EXEC: "{{ k3s_exec_args }}"
  when: not k3s_bin.stat.exists
  changed_when: true

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for node to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  changed_when: false
  retries: 10
  delay: 6
  until: "'Ready' in k3s_nodes.stdout"
